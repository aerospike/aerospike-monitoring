name: Docker Datadog Aerospike Enterprise Agent Integration 

on:
  workflow_dispatch:
    inputs:
      docker_tag: 
         description: Docker Tag
         required: false
jobs:
  build-container:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Get latest release tag
      uses: actions-ecosystem/action-get-latest-tag@b7c32daec3395a9616f88548363a42652b22d435 # v1.6.0
      id: get-latest-tag

    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Set up Docker Buildx
      uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

    - name: Docker login
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      env:
        DOCKER_MULTI_ARCH_PLATFORMS: linux/amd64,linux/arm64
      run: |
        VERSION_TAG=$(echo "${{ github.event.inputs.docker_tag }}" | xargs)

        if [ -n "$VERSION_TAG" ]; then

            echo "Using tag version $VERSION_TAG"
            docker buildx build --build-arg VERSION=$VERSION_TAG \
                  --platform $DOCKER_MULTI_ARCH_PLATFORMS \
                  --push . -f build/datadog.Dockerfile \
                  -t aerospike/datadog-aerospike-integration:latest \
                  -t aerospike/datadog-aerospike-integration:$VERSION_TAG
        fi 
